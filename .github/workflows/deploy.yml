name: Deploy to GitHub Pages

on:
  push:
    branches: [main, gh-pages]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: |
          node -c docs/lib.js
          node -c docs/app.js
          node -c docs/gemma-reranker.js
          node -c docs/vllm-reranker.js
          node -c docs/citation-audit.js

      - name: Run JavaScript tests
        run: |
          node tests/test_lib.js
          node tests/test_speed_primitives.js
          node tests/test_vllm_reranker.js
          node tests/test_citation_audit.js
          node tests/test_fixture_harness.js
          node tests/test_fixture_snapshot.js

      - name: Run Python proxy tests
        run: |
          python3 -m py_compile server/vllm_proxy_server.py
          python3 tests/test_vllm_proxy.py

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
